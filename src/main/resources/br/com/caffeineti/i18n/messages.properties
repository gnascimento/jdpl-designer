about.title=About
about.message=jPDL 3.2 Designer\n\nDeveloper: Gabriel Nascimento dos Santos\nEmail: gnascimento.info@gmail.com\n\n- Drag nodes from the palette onto the canvas\n- Hover a node edge and drag the green port to connect\n- Scroll (trackpad / mouse wheel) = zoom, centered on cursor\n- Middle-button drag = pan\n- Delete / Backspace = remove selected element\n- Auto Layout = reorganize diagram in readable layers (Ctrl+Shift+L)\n- Fit = fit the entire diagram in the visible area (Ctrl+Shift+F)

