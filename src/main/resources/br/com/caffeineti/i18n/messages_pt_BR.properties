about.message=jPDL 3.2 Designer\n\nDesenvolvedor: Gabriel Nascimento dos Santos\nE-mail: gnascimento.info@gmail.com\n\n- Arraste nós da paleta para o canvas\n- Passe sobre a borda do nó e arraste a porta verde para conectar\n- Rolagem (trackpad / mouse) = zoom centralizado no cursor\n- Arrastar com botão do meio = pan\n- Delete / Backspace = remover o elemento selecionado\n- Layout Automático = reorganiza o diagrama em camadas legíveis (Ctrl+Shift+L)\n- Ajustar = encaixa o diagrama inteiro na área visível (Ctrl+Shift+F)

